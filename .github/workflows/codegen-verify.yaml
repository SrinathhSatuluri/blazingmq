name: Codegen Verification

on:
  push:
    branches:
      - feature/xsd-codegen-python
  workflow_dispatch:

concurrency:
  group: codegen-${{ github.ref }}
  cancel-in-progress: true

env:
  # Shared codegen script sourced by all jobs that need to generate
  CODEGEN_SCRIPT: |
    declare -A SCHEMAS
    SCHEMAS=(
      ["m_bmqtool"]="src/applications/bmqtool:bmqtoolcmd.xsd:messages"
      ["bmqp_ctrlmsg"]="src/groups/bmq/bmqp:bmqp_ctrlmsg.xsd:messages"
      ["bmqstm"]="src/groups/bmq/bmqstm:bmqstm.xsd:values"
      ["mqbcfg"]="src/groups/mqb/mqbcfg:mqbcfg.xsd:messages"
      ["mqbcmd"]="src/groups/mqb/mqbcmd:mqbcmd.xsd:messages"
      ["mqbconfm"]="src/groups/mqb/mqbconfm:mqbconf.xsd:messages"
    )
    for pkg in "${!SCHEMAS[@]}"; do
      IFS=: read -r dir xsd comp <<< "${SCHEMAS[$pkg]}"
      python -m blazingmq.codegen \
        --package "$pkg" \
        --msgComponent "$comp" \
        --output-dir "$dir" \
        --clang-format \
        "$dir/$xsd"
    done

jobs:
  # ===================================================================
  # TIER 1: Smoke test — generator runs, wire protocol constants match
  # ===================================================================
  codegen_smoke:
    name: "Generator Smoke Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -qy clang-format

      - name: Run generator on all schemas
        env:
          PYTHONPATH: ${{ github.workspace }}/src/python
        run: |
          declare -A SCHEMAS
          SCHEMAS=(
            ["m_bmqtool"]="src/applications/bmqtool:bmqtoolcmd.xsd:messages"
            ["bmqp_ctrlmsg"]="src/groups/bmq/bmqp:bmqp_ctrlmsg.xsd:messages"
            ["bmqstm"]="src/groups/bmq/bmqstm:bmqstm.xsd:values"
            ["mqbcfg"]="src/groups/mqb/mqbcfg:mqbcfg.xsd:messages"
            ["mqbcmd"]="src/groups/mqb/mqbcmd:mqbcmd.xsd:messages"
            ["mqbconfm"]="src/groups/mqb/mqbconfm:mqbconf.xsd:messages"
          )
          for pkg in "${!SCHEMAS[@]}"; do
            IFS=: read -r dir xsd comp <<< "${SCHEMAS[$pkg]}"
            echo "::group::Generating $pkg"
            python -m blazingmq.codegen \
              --package "$pkg" \
              --msgComponent "$comp" \
              --output-dir "$dir" \
              --clang-format \
              "$dir/$xsd"
            echo "::endgroup::"
          done

      - name: Diff statistics
        run: |
          echo "=== Per-file diff line counts ==="
          git diff --numstat
          echo ""
          echo "=== Summary ==="
          git diff --shortstat

      - name: Wire protocol verification
        env:
          PYTHONPATH: ${{ github.workspace }}/src/python
        run: |
          python3 << 'PYEOF'
          import re, sys, pathlib, subprocess

          GOLDEN_FILES = [
              "src/groups/mqb/mqbcfg/mqbcfg_messages.h",
              "src/groups/mqb/mqbconfm/mqbconfm_messages.h",
              "src/groups/mqb/mqbcmd/mqbcmd_messages.h",
              "src/groups/bmq/bmqp/bmqp_ctrlmsg_messages.h",
              "src/groups/bmq/bmqstm/bmqstm_values.h",
              "src/applications/bmqtool/m_bmqtool_messages.h",
          ]

          PATTERNS = [
              re.compile(r"ATTRIBUTE_ID_(\w+)\s*=\s*(-?\d+)"),
              re.compile(r"SELECTION_ID_(\w+)\s*=\s*(-?\d+)"),
              re.compile(r"e_(\w+)\s*=\s*(-?\d+)"),
          ]

          def extract_constants(text):
              constants = {}
              for pat in PATTERNS:
                  for m in pat.finditer(text):
                      constants[m.group(0).strip()] = m.group(2)
              return constants

          total = 0
          mismatches = 0

          for path_str in GOLDEN_FILES:
              path = pathlib.Path(path_str)
              if not path.exists():
                  print(f"SKIP {path} (not found)")
                  continue

              generated = path.read_text()
              result = subprocess.run(
                  ["git", "show", f"HEAD:{path_str}"],
                  capture_output=True, text=True
              )
              if result.returncode != 0:
                  print(f"SKIP {path} (not in git)")
                  continue
              original = result.stdout

              orig_consts = extract_constants(original)
              gen_consts = extract_constants(generated)

              file_total = len(orig_consts)
              total += file_total

              file_mismatches = 0
              for key, val in orig_consts.items():
                  if key not in gen_consts:
                      print(f"  MISSING: {key} in {path.name}")
                      file_mismatches += 1
                  elif gen_consts[key] != val:
                      print(f"  CHANGED: {key}: {val} -> {gen_consts[key]} in {path.name}")
                      file_mismatches += 1

              mismatches += file_mismatches
              status = "PASS" if file_mismatches == 0 else "FAIL"
              print(f"{status} {path.name}: {file_total} constants, {file_mismatches} mismatches")

          print(f"\n=== Wire Protocol Summary ===")
          print(f"Total constants: {total}")
          print(f"Mismatches: {mismatches}")

          if mismatches > 0:
              print("FAIL: Wire protocol constants do not match!")
              sys.exit(1)
          else:
              print("PASS: All wire protocol constants match.")
          PYEOF

  # ===================================================================
  # DEPENDENCIES
  # ===================================================================
  get_dependencies:
    name: "Dependencies [C++23]"
    uses: ./.github/workflows/dependencies.yaml
    with:
      cxx_standard: cpp23

  get_dependencies_cpp03:
    name: "Dependencies [C++03]"
    uses: ./.github/workflows/dependencies.yaml
    with:
      cxx_standard: cpp03

  # ===================================================================
  # TIER 2: Build with generated code
  # ===================================================================
  build_generated:
    name: "Build [ubuntu, C++23]"
    runs-on: ubuntu-latest
    needs: [codegen_smoke, get_dependencies]
    outputs:
      artifact_key: ${{ steps.artifact.outputs.key }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -qy build-essential \
            gdb curl python3.10 python3-pip \
            cmake ninja-build pkg-config \
            bison libfl-dev libbenchmark-dev libz-dev \
            clang-format

      - name: Restore cached dependencies
        uses: actions/cache/restore@v4
        with:
          path: deps
          key: ${{ needs.get_dependencies.outputs.cache_key }}

      - name: Install dependencies
        working-directory: deps
        run: ../docker/build_deps.sh --cxx-standard=cpp23

      - name: Run code generator
        env:
          PYTHONPATH: ${{ github.workspace }}/src/python
        run: |
          declare -A SCHEMAS
          SCHEMAS=(
            ["m_bmqtool"]="src/applications/bmqtool:bmqtoolcmd.xsd:messages"
            ["bmqp_ctrlmsg"]="src/groups/bmq/bmqp:bmqp_ctrlmsg.xsd:messages"
            ["bmqstm"]="src/groups/bmq/bmqstm:bmqstm.xsd:values"
            ["mqbcfg"]="src/groups/mqb/mqbcfg:mqbcfg.xsd:messages"
            ["mqbcmd"]="src/groups/mqb/mqbcmd:mqbcmd.xsd:messages"
            ["mqbconfm"]="src/groups/mqb/mqbconfm:mqbconf.xsd:messages"
          )
          for pkg in "${!SCHEMAS[@]}"; do
            IFS=: read -r dir xsd comp <<< "${SCHEMAS[$pkg]}"
            echo "::group::Generating $pkg"
            python -m blazingmq.codegen \
              --package "$pkg" --msgComponent "$comp" \
              --output-dir "$dir" --clang-format \
              "$dir/$xsd"
            echo "::endgroup::"
          done

      - name: Show what changed
        run: git diff --stat

      - name: Build BlazingMQ
        run: |
          cmake --preset gh-build-ubuntu-latest-cpp23 -S .
          echo "::add-matcher::.github/workflows/problem-matchers/cpp.json"
          cmake --build --preset gh-build-ubuntu-latest-cpp23 \
            --target bmqbrkr bmqtool bmqstoragetool all.it
          echo "::remove-matcher owner=cpp"

      - name: Clean object files before saving
        run: |
          find . -name "*.o" -type f -delete
          find . -name "*.a" -type f -delete

      - name: Generate artifact key
        id: artifact
        run: |
          echo "key=codegen-build-${{ github.sha }}" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.key }}
          path: |
            build/blazingmq
            deps
          retention-days: 1

  build_generated_cpp03:
    name: "Build [ubuntu, C++03]"
    runs-on: ubuntu-latest
    needs: [codegen_smoke, get_dependencies_cpp03]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -qy build-essential \
            gdb curl python3.10 python3-pip \
            cmake ninja-build pkg-config \
            bison libfl-dev libbenchmark-dev libz-dev \
            clang-format

      - name: Restore cached dependencies
        uses: actions/cache/restore@v4
        with:
          path: deps
          key: ${{ needs.get_dependencies_cpp03.outputs.cache_key }}

      - name: Install dependencies
        working-directory: deps
        run: ../docker/build_deps.sh --cxx-standard=cpp03

      - name: Run code generator
        env:
          PYTHONPATH: ${{ github.workspace }}/src/python
        run: |
          declare -A SCHEMAS
          SCHEMAS=(
            ["m_bmqtool"]="src/applications/bmqtool:bmqtoolcmd.xsd:messages"
            ["bmqp_ctrlmsg"]="src/groups/bmq/bmqp:bmqp_ctrlmsg.xsd:messages"
            ["bmqstm"]="src/groups/bmq/bmqstm:bmqstm.xsd:values"
            ["mqbcfg"]="src/groups/mqb/mqbcfg:mqbcfg.xsd:messages"
            ["mqbcmd"]="src/groups/mqb/mqbcmd:mqbcmd.xsd:messages"
            ["mqbconfm"]="src/groups/mqb/mqbconfm:mqbconf.xsd:messages"
          )
          for pkg in "${!SCHEMAS[@]}"; do
            IFS=: read -r dir xsd comp <<< "${SCHEMAS[$pkg]}"
            python -m blazingmq.codegen \
              --package "$pkg" --msgComponent "$comp" \
              --output-dir "$dir" --clang-format \
              "$dir/$xsd"
          done

      - name: Build BlazingMQ [C++03]
        run: |
          cmake --preset gh-build-ubuntu-latest-cpp03 -S .
          echo "::add-matcher::.github/workflows/problem-matchers/cpp.json"
          cmake --build --preset gh-build-ubuntu-latest-cpp03 \
            --target bmqbrkr bmqtool bmq.t mqb.t
          echo "::remove-matcher owner=cpp"

  # ===================================================================
  # TIER 3: Unit tests with generated code
  # ===================================================================
  unit_tests_generated:
    name: "UT [C++]"
    runs-on: ubuntu-latest
    needs: [codegen_smoke, get_dependencies]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -qy build-essential \
            gdb curl python3.10 python3-pip \
            cmake ninja-build pkg-config \
            bison libfl-dev libbenchmark-dev libz-dev \
            clang-format

      - name: Restore cached dependencies
        uses: actions/cache/restore@v4
        with:
          path: deps
          key: ${{ needs.get_dependencies.outputs.cache_key }}

      - name: Install dependencies
        working-directory: deps
        run: ../docker/build_deps.sh --cxx-standard=cpp23

      - name: Run code generator
        env:
          PYTHONPATH: ${{ github.workspace }}/src/python
        run: |
          declare -A SCHEMAS
          SCHEMAS=(
            ["m_bmqtool"]="src/applications/bmqtool:bmqtoolcmd.xsd:messages"
            ["bmqp_ctrlmsg"]="src/groups/bmq/bmqp:bmqp_ctrlmsg.xsd:messages"
            ["bmqstm"]="src/groups/bmq/bmqstm:bmqstm.xsd:values"
            ["mqbcfg"]="src/groups/mqb/mqbcfg:mqbcfg.xsd:messages"
            ["mqbcmd"]="src/groups/mqb/mqbcmd:mqbcmd.xsd:messages"
            ["mqbconfm"]="src/groups/mqb/mqbconfm:mqbconf.xsd:messages"
          )
          for pkg in "${!SCHEMAS[@]}"; do
            IFS=: read -r dir xsd comp <<< "${SCHEMAS[$pkg]}"
            python -m blazingmq.codegen \
              --package "$pkg" --msgComponent "$comp" \
              --output-dir "$dir" --clang-format \
              "$dir/$xsd"
          done

      - name: Build all unit tests
        run: |
          cmake --preset gh-build-ubuntu-latest-cpp23 -S .
          echo "::add-matcher::.github/workflows/problem-matchers/cpp.json"
          cmake --build --preset gh-build-ubuntu-latest-cpp23 --target all.t
          echo "::remove-matcher owner=cpp"

      - name: Run unit tests
        run: ctest --preset gh-build-ubuntu-latest-cpp23

  unit_tests_python_generated:
    name: "UT [Python]"
    runs-on: ubuntu-latest
    needs: build_generated
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Python Unit Tests
        env:
          PYTHONPATH: ${{ github.workspace }}/src/python
        run: |
          pip install -r ${{ github.workspace }}/src/python/requirements.txt
          pip install "xsdata[cli]==25.7"
          cd ${{ github.workspace }}
          src/python/bin/schemagen
          src/python/bin/tweakgen
          pytest src/python

  # ===================================================================
  # TIER 4: Integration tests with generated code
  # ===================================================================
  integration_tests_generated:
    name: "IT [${{ matrix.cluster }}/${{ matrix.mode }}/${{ matrix.consistency }}]"
    strategy:
      matrix:
        mode: ["legacy_mode", "fsm_mode"]
        cluster: ["single", "multi"]
        consistency: ["eventual_consistency", "strong_consistency"]
      fail-fast: false
    runs-on: ubuntu-latest
    needs: build_generated
    env:
      RUN_UID: ${{ matrix.cluster }}_${{ matrix.mode }}_${{ matrix.consistency }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build_generated.outputs.artifact_key }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Chmod all .tsk
        run: find ./build -type f -name "*.tsk" -exec chmod +x {} +

      - name: Setup core_pattern
        run: |
          sudo mkdir /cores
          sudo chmod 777 /cores
          echo "/cores/%e.%p.%s.%t" | sudo tee /proc/sys/kernel/core_pattern

      - name: Run Integration Tests
        run: |
          ulimit -c unlimited

          go install github.com/kevwan/tproxy@d6d45cbbd1b3c5dad6e5043b74120f9ea962826b
          export GOPATH=$HOME/go
          export PATH=$PATH:/usr/local/go/bin:$GOPATH/bin

          pip install -r ${{ github.workspace }}/src/python/requirements.txt

          ${{ github.workspace }}/src/integration-tests/run-tests \
            "${{ matrix.mode }} and ${{ matrix.cluster }} and ${{ matrix.consistency }}" \
            --log-level ERROR                   \
            --log-file-level=info               \
            --bmq-tolerate-dirty-shutdown       \
            --bmq-log-dir=failure-logs          \
            --bmq-log-level=INFO                \
            --junitxml=integration-tests.xml    \
            --tb long                           \
            --durations=0                       \
            -n logical -v

      - name: Print core information
        if: failure()
        run: |
          sudo apt-get update && sudo apt-get install -qy gdb
          python3 ${{ github.workspace }}/.github/workflows/ext/print_cores.py \
            --cores-dir=${{ github.workspace }}/src/integration-tests/failure-logs \
            --build-dir=${{ github.workspace }}/build/blazingmq

      - name: Upload failure-logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: codegen_failure_logs_${{ env.RUN_UID }}
          path: ${{ github.workspace }}/src/integration-tests/failure-logs
          retention-days: 5

  # ===================================================================
  # TIER 5: Fuzz tests with generated code
  # ===================================================================
  fuzz_tests_generated:
    name: "Fuzz [${{ matrix.request }}]"
    strategy:
      matrix:
        request:
          - "authentication"
          - "negotiation_bypass_authentication"
          - "negotiation"
          - "open_queue"
          - "configure_stream"
          - "configure_queue_stream"
          - "put"
          - "confirm"
          - "close_queue"
          - "disconnect"
      fail-fast: false
    runs-on: ubuntu-latest
    needs: build_generated
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build_generated.outputs.artifact_key }}

      - name: Chmod all .tsk
        run: |
          find ./build -type f -name "*.tsk" -exec chmod +x {} +
          chmod +x ./build/blazingmq/src/applications/bmqbrkr/run

      - name: Setup core_pattern
        run: |
          sudo mkdir /cores
          sudo chmod 777 /cores
          echo "/cores/%e.%p.%s.%t" | sudo tee /proc/sys/kernel/core_pattern

      - name: Run Fuzz Test
        run: |
          pip install -r ${{ github.workspace }}/src/python/requirements.txt
          cd src/python
          python3 -m blazingmq.dev.fuzztest \
            --broker-dir ${{ github.workspace }}/build/blazingmq/src/applications/bmqbrkr \
            --request ${{ matrix.request }} \
            > ${{ matrix.request }}_fuzz.log

      - name: Print Fuzz Log tail
        if: failure()
        run: tail -n 2000 src/python/${{ matrix.request }}_fuzz.log

      - name: Print core information
        if: failure()
        run: |
          sudo apt-get update && sudo apt-get install -qy gdb
          python3 ${{ github.workspace }}/.github/workflows/ext/print_cores.py \
            --cores-dir=/cores \
            --build-dir=${{ github.workspace }}/build/blazingmq

      - name: Upload fuzz-logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: codegen_${{ matrix.request }}_fuzz.log
          path: ${{ github.workspace }}/src/python/${{ matrix.request }}_fuzz.log
          retention-days: 5

  # ===================================================================
  # TIER 6: Storage tool integration tests
  # ===================================================================
  storage_tool_it_generated:
    name: "IT [Storage tool]"
    runs-on: ubuntu-latest
    needs: build_generated
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build_generated.outputs.artifact_key }}

      - name: Chmod all .tsk
        run: find ./build -type f -name "*.tsk" -exec chmod +x {} +

      - name: Run Storage Tool integration tests
        run: |
          pip install -r ${{ github.workspace }}/src/python/requirements.txt
          cd ${{ github.workspace }}/src/applications/bmqstoragetool/integration-tests
          ./run-tests

  # ===================================================================
  # TIER 7: Sanitizers — memory safety with generated code
  # ===================================================================
  sanitize_generated:
    name: "Sanitize [${{ matrix.mode }}]"
    needs: [codegen_smoke]
    strategy:
      matrix:
        mode: ["asan", "msan", "tsan", "ubsan"]
      fail-fast: false
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run code generator
        env:
          PYTHONPATH: ${{ github.workspace }}/src/python
        run: |
          sudo apt-get update
          sudo apt-get install -qy clang-format

          declare -A SCHEMAS
          SCHEMAS=(
            ["m_bmqtool"]="src/applications/bmqtool:bmqtoolcmd.xsd:messages"
            ["bmqp_ctrlmsg"]="src/groups/bmq/bmqp:bmqp_ctrlmsg.xsd:messages"
            ["bmqstm"]="src/groups/bmq/bmqstm:bmqstm.xsd:values"
            ["mqbcfg"]="src/groups/mqb/mqbcfg:mqbcfg.xsd:messages"
            ["mqbcmd"]="src/groups/mqb/mqbcmd:mqbcmd.xsd:messages"
            ["mqbconfm"]="src/groups/mqb/mqbconfm:mqbconf.xsd:messages"
          )
          for pkg in "${!SCHEMAS[@]}"; do
            IFS=: read -r dir xsd comp <<< "${SCHEMAS[$pkg]}"
            python -m blazingmq.codegen \
              --package "$pkg" --msgComponent "$comp" \
              --output-dir "$dir" --clang-format \
              "$dir/$xsd"
          done

      - name: Purge runner
        run: |
          sudo apt-get purge -y \
            azure-cli microsoft-edge-stable google-cloud-cli \
            google-chrome-stable temurin-21-jdk temurin-17-jdk \
            temurin-11-jdk dotnet-sdk-8.0 firefox temurin-8-jdk \
            powershell libllvm17t64 libllvm18 libllvm16t64 \
            openjdk-21-jre-headless mysql-server-core-8.0
          sudo apt-get autoremove
          sudo apt-get autoclean

      - name: Build with ${{ matrix.mode }}
        run: |
          docker build -f ${{ github.workspace }}/docker/sanitizers/Dockerfile \
            --no-cache --build-arg SANITIZER_NAME=${{ matrix.mode }} \
            --build-arg FUZZER=off -t sanitizer-codegen .

      - name: Run unit tests under ${{ matrix.mode }}
        run: docker run --rm sanitizer-codegen

      - name: Run integration tests under ${{ matrix.mode }}
        run: |
          docker run --rm sanitizer-codegen \
            /blazingmq/cmake.bld/Linux/run-it.sh \
            -k breathing --reruns=2 --bmq-tolerate-dirty-shutdown

  # ===================================================================
  # TIER 8: macOS build with generated code
  # ===================================================================
  build_generated_macos:
    name: "Build [macosx_arm64]"
    runs-on: macos-14
    needs: [codegen_smoke]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up dependencies
        run: |
          brew install \
            bison flex google-benchmark googletest python@3.10 zlib

      - name: Run code generator
        env:
          PYTHONPATH: ${{ github.workspace }}/src/python
        run: |
          python -m blazingmq.codegen --package m_bmqtool --msgComponent messages \
            --output-dir src/applications/bmqtool src/applications/bmqtool/bmqtoolcmd.xsd
          python -m blazingmq.codegen --package bmqp_ctrlmsg --msgComponent messages \
            --output-dir src/groups/bmq/bmqp src/groups/bmq/bmqp/bmqp_ctrlmsg.xsd
          python -m blazingmq.codegen --package bmqstm --msgComponent values \
            --output-dir src/groups/bmq/bmqstm src/groups/bmq/bmqstm/bmqstm.xsd
          python -m blazingmq.codegen --package mqbcfg --msgComponent messages \
            --output-dir src/groups/mqb/mqbcfg src/groups/mqb/mqbcfg/mqbcfg.xsd
          python -m blazingmq.codegen --package mqbcmd --msgComponent messages \
            --output-dir src/groups/mqb/mqbcmd src/groups/mqb/mqbcmd/mqbcmd.xsd
          python -m blazingmq.codegen --package mqbconfm --msgComponent messages \
            --output-dir src/groups/mqb/mqbconfm src/groups/mqb/mqbconfm/mqbconf.xsd

      - name: Build BlazingMQ [macOS]
        env:
          CXXFLAGS: "-Werror -Wno-poison-system-directories"
        run: |
          echo "::add-matcher::.github/workflows/problem-matchers/cpp.json"
          bin/build-darwin.sh
          echo "::remove-matcher owner=cpp"
